services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-delivery-api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://food_delivery:food_delivery@postgres:5432/food_delivery?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: food-delivery-postgres
    environment:
      POSTGRES_USER: food_delivery
      POSTGRES_PASSWORD: food_delivery
      POSTGRES_DB: food_delivery
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/10-init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U food_delivery -d food_delivery']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: food-delivery-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: food-delivery-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana-oss:11.3.1
    container_name: food-delivery-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
