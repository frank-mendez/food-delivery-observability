services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: food-delivery-api
    mem_limit: 512m
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://food_delivery:food_delivery@postgres:5432/food_delivery?schema=public
      POSTGRES_POOL_MAX: 10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      JWT_ACCESS_TOKEN_SECRET: local-compose-access-secret-change-me
      JWT_REFRESH_TOKEN_SECRET: local-compose-refresh-secret-change-me
      JWT_ACCESS_TOKEN_TTL_SECONDS: 900
      JWT_REFRESH_TOKEN_TTL_SECONDS: 604800
      PAYMENT_SIM_MIN_LATENCY_MS: 75
      PAYMENT_SIM_MAX_LATENCY_MS: 350
      LOG_LEVEL: info
      OTEL_SERVICE_NAME: food-delivery-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_BSP_SCHEDULE_DELAY: 1000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      alloy:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: food-delivery-postgres
    environment:
      POSTGRES_USER: food_delivery
      POSTGRES_PASSWORD: food_delivery
      POSTGRES_DB: food_delivery
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/10-init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U food_delivery -d food_delivery']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: food-delivery-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: food-delivery-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - '9090:9090'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started
      cadvisor:
        condition: service_started

  loki:
    image: grafana/loki:3.3.1
    container_name: food-delivery-loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    ports:
      - '3100:3100'
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  tempo:
    image: grafana/tempo:2.6.1
    container_name: food-delivery-tempo
    user: root
    command:
      - -config.file=/etc/tempo.yml
    ports:
      - '3200:3200'
    volumes:
      - ./infrastructure/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: food-delivery-alloy
    user: root
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    ports:
      - '12345:12345'
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./infrastructure/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: food-delivery-cadvisor
    privileged: true
    ports:
      - '8081:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  grafana:
    image: grafana/grafana-oss:11.3.1
    container_name: food-delivery-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
