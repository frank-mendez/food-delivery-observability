global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: food-delivery-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:4000

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
